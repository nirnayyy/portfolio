<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Thank you for reaching out!" />
  <title>Message Sent — Nirnay Pratap Singh</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #070708;
      --text: #fafafa;
      --text-muted: #a3a3a3;
      --border: rgba(255, 255, 255, 0.08);
      --card-bg: rgba(255, 255, 255, 0.035);
      --accent: #ffffff;
    }

    html[data-theme="light"] {
      --bg: #f5f5f4;
      --text: #1c1917;
      --text-muted: #78716c;
      --border: rgba(0, 0, 0, 0.08);
      --card-bg: rgba(0, 0, 0, 0.025);
      --accent: #1c1917;
    }

    html[data-theme="retro"] {
      --bg: #000000;
      --text: #00ff00;
      --text-muted: #00ff00;
      --border: rgba(0, 255, 0, 0.3);
      --card-bg: #000000;
      --accent: #00ff00;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    /* Grain and dots */
    .grain {
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 9998;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .dot-grid {
      pointer-events: none;
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    html[data-theme="light"] .dot-grid {
      background-image: radial-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px);
    }
    html[data-theme="retro"] .dot-grid {
      background-image: radial-gradient(rgba(0, 255, 0, 0.15) 1px, transparent 1px);
    }

    /* Glass Card */
    .success-card {
      max-width: 420px;
      width: 100%;
      padding: 3rem 2.5rem;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.35);
      position: relative;
      text-align: center;
      z-index: 10;
    }

    /* Glow border tracking */
    .glow-border-card::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: radial-gradient(350px circle at var(--mouse-x, 0px) var(--mouse-y, 0px), rgba(255, 255, 255, 0.15), transparent 45%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      z-index: 1;
    }
    html[data-theme="light"] .glow-border-card::before {
      background: radial-gradient(350px circle at var(--mouse-x, 0px) var(--mouse-y, 0px), rgba(0, 0, 0, 0.12), transparent 45%);
    }
    html[data-theme="retro"] .glow-border-card::before {
      background: none;
      border: 1px solid #00ff00;
    }

    /* SVG icon wrapper */
    .success-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1px solid var(--border);
      margin-bottom: 1.5rem;
      color: var(--text);
      background: rgba(255, 255, 255, 0.02);
    }
    .success-icon svg {
      width: 32px;
      height: 32px;
    }

    .success-title {
      font-family: 'Bebas Neue', 'Anton', sans-serif;
      font-size: 2.75rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      color: #ffffff;
    }
    html[data-theme="light"] .success-title {
      color: #1c1917;
    }

    .success-desc {
      font-size: 0.925rem;
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 2.25rem;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      gap: 10px;
      padding: 1.1rem 1.5rem;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      cursor: pointer;
    }
    .home-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .home-btn:hover {
      background: #ffffff;
      color: #000000;
      border-color: #ffffff;
      transform: translateY(-2px);
    }
    html[data-theme="light"] .home-btn:hover {
      background: #1c1917;
      color: #ffffff;
      border-color: #1c1917;
    }

    /* Custom cursor */
    .cursor-dot,
    .cursor-ring {
      position: fixed;
      top: 0; left: 0;
      width: 6px; height: 6px;
      margin-left: -3px; margin-top: -3px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate3d(0, 0, 0);
      transition: transform 0.08s ease-out, opacity 0.2s ease;
    }
    .cursor-dot {
      background: var(--text);
    }
    .cursor-ring {
      width: 26px; height: 26px;
      margin-left: -13px; margin-top: -13px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: left 0.15s ease-out, top 0.15s ease-out, transform 0.2s, background-color 0.2s, border-color 0.2s;
    }
    html[data-theme="light"] .cursor-ring {
      border: 1px solid rgba(0, 0, 0, 0.2);
    }
    html[data-theme="retro"] .cursor-ring {
      border: 1px solid #00ff00;
      border-radius: 0;
    }
    html[data-theme="retro"] .cursor-dot {
      background: #00ff00;
      border-radius: 0;
    }

    /* Retro CRT Scanlines & Flicker */
    .crt-flicker {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
      background-size: 100% 4px, 4px 100%;
      z-index: 99999;
    }
    .crt-flicker::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: rgba(18, 16, 16, 0.08);
      opacity: 0.15;
      z-index: 100000;
      pointer-events: none;
      animation: crt-flicker-anim 0.15s infinite;
    }
    @keyframes crt-flicker-anim {
      0% { opacity: 0.1; }
      50% { opacity: 0.15; }
      100% { opacity: 0.1; }
    }

    /* Ambient Light Effects (Modern Only) */
    .modern-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 1;
      pointer-events: none;
    }
    .glow-1 {
      top: 20%;
      left: 15%;
      width: 300px;
      height: 300px;
      background: rgba(255, 255, 255, 0.02);
    }
    .glow-2 {
      bottom: 20%;
      right: 15%;
      width: 350px;
      height: 350px;
      background: rgba(255, 255, 255, 0.015);
    }

    /* Hide elements in retro */
    html[data-theme="retro"] .modern-glow {
      display: none !important;
    }
    html[data-theme="retro"] .success-card {
      border: 1px solid #00ff00 !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
    html[data-theme="retro"] .success-icon {
      border: 1px solid #00ff00 !important;
      border-radius: 0 !important;
      background: none !important;
      color: #00ff00 !important;
    }
    html[data-theme="retro"] .success-title {
      font-family: 'Press Start 2P', monospace !important;
      font-size: 1.25rem !important;
      line-height: 1.7 !important;
      color: #00ff00 !important;
    }
    html[data-theme="retro"] body {
      font-family: 'Share Tech Mono', monospace !important;
    }
    html[data-theme="retro"] .success-desc {
      color: #00ff00 !important;
    }
    html[data-theme="retro"] .home-btn {
      border: 1px solid #00ff00 !important;
      border-radius: 0 !important;
      background: none !important;
      color: #00ff00 !important;
    }
    html[data-theme="retro"] .home-btn:hover {
      background: rgba(0, 255, 0, 0.15) !important;
      color: #00ff00 !important;
      transform: none !important;
    }
  </style>
</head>
<body>
  <div class="dot-grid" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <!-- Ambient Light Effects (Modern Only) -->
  <div class="modern-glow glow-1" aria-hidden="true"></div>
  <div class="modern-glow glow-2" aria-hidden="true"></div>

  <!-- Main success card with spotlight glow coordinate tracker -->
  <div class="success-card glow-border-card">
    <div class="success-icon">
      <svg fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
    </div>

    <h1 class="success-title">
      Thank You!
    </h1>
    <p class="success-desc">
      Thank you for reaching out! I would love to get in contact with you and will review your message shortly. I'll get back to you as soon as possible.
    </p>

    <!-- Custom styled back home button -->
    <a href="index.html" class="home-btn">
      <svg fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"></path>
      </svg>
      <span>Back to Home</span>
    </a>
  </div>

  <!-- Custom Cursor elements -->
  <div class="cursor-dot" id="cursorDot" aria-hidden="true"></div>
  <div class="cursor-ring" id="cursorRing" aria-hidden="true"></div>

  <script>
    // Initialize correct theme from local storage
    const savedTheme = localStorage.getItem("portfolio-theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);

    // If retro mode is active, inject scanlines glitch overlay
    if (savedTheme === 'retro') {
      const crt = document.createElement('div');
      crt.className = 'crt-flicker';
      document.body.appendChild(crt);
    }

    // Spotlights coordinate tracker binding
    const card = document.querySelector('.glow-border-card');
    if (card) {
      document.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        card.style.setProperty('--mouse-x', `${x}px`);
        card.style.setProperty('--mouse-y', `${y}px`);
      });
    }

    // Custom Cursor tracking logic
    const dot = document.getElementById("cursorDot");
    const ring = document.getElementById("cursorRing");
    const finePointer = window.matchMedia("(pointer: fine)").matches;
    let mx = 0, my = 0, rx = 0, ry = 0;

    if (finePointer && dot && ring) {
      document.addEventListener("mousemove", (e) => {
        mx = e.clientX;
        my = e.clientY;
        dot.style.left = mx + "px";
        dot.style.top = my + "px";
      });
      const animRing = () => {
        rx += (mx - rx) * 0.12;
        ry += (my - ry) * 0.12;
        ring.style.left = rx + "px";
        ring.style.top = ry + "px";
        requestAnimationFrame(animRing);
      };
      animRing();

      document.querySelectorAll("a").forEach((el) => {
        el.addEventListener("mouseenter", () => ring.classList.add("scale-[1.5]", "bg-white/10"));
        el.addEventListener("mouseleave", () => ring.classList.remove("scale-[1.5]", "bg-white/10"));
      });
    } else {
      if (dot) dot.style.display = "none";
      if (ring) ring.style.display = "none";
    }
  </script>
</body>
</html>
