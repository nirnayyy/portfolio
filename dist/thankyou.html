<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Thank you for reaching out!" />
  <title>Message Sent — Nirnay Pratap Singh</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Bebas Neue"', '"Anton"', 'sans-serif'],
            body: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['"Share Tech Mono"', 'monospace'],
          },
        },
      },
    };
  </script>
  <style>
    :root {
      --bg: #070708;
      --text: #fafafa;
      --text-muted: #a3a3a3;
      --border: rgba(255, 255, 255, 0.08);
      --card-bg: rgba(255, 255, 255, 0.01);
      --accent: #ffffff;
    }

    html[data-theme="light"] {
      --bg: #f5f5f4;
      --text: #1c1917;
      --text-muted: #78716c;
      --border: rgba(0, 0, 0, 0.08);
      --card-bg: rgba(0, 0, 0, 0.01);
      --accent: #1c1917;
    }

    html[data-theme="retro"] {
      --bg: #000000;
      --text: #00ff00;
      --text-muted: #00ff00;
      --border: rgba(0, 255, 0, 0.3);
      --card-bg: #000000;
      --accent: #00ff00;
    }

    body {
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    /* Grain and dots */
    .grain {
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 9998;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .dot-grid {
      pointer-events: none;
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    html[data-theme="light"] .dot-grid {
      background-image: radial-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px);
    }
    html[data-theme="retro"] .dot-grid {
      background-image: radial-gradient(rgba(0, 255, 0, 0.15) 1px, transparent 1px);
    }

    /* Glass Card */
    .success-card {
      border: 1px solid var(--border);
      background: var(--card-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.35);
      position: relative;
    }

    /* Glow border tracking */
    .glow-border-card::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: radial-gradient(350px circle at var(--mouse-x, 0px) var(--mouse-y, 0px), rgba(255, 255, 255, 0.15), transparent 45%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      z-index: 1;
    }
    html[data-theme="light"] .glow-border-card::before {
      background: radial-gradient(350px circle at var(--mouse-x, 0px) var(--mouse-y, 0px), rgba(0, 0, 0, 0.12), transparent 45%);
    }
    html[data-theme="retro"] .glow-border-card::before {
      background: none;
      border: 1px solid #00ff00;
    }

    /* Custom cursor */
    .cursor-dot,
    .cursor-ring {
      position: fixed;
      top: 0; left: 0;
      width: 6px; height: 6px;
      margin-left: -3px; margin-top: -3px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate3d(0, 0, 0);
      transition: transform 0.08s ease-out, opacity 0.2s ease;
    }
    .cursor-dot {
      background: var(--text);
    }
    .cursor-ring {
      width: 26px; height: 26px;
      margin-left: -13px; margin-top: -13px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: left 0.15s ease-out, top 0.15s ease-out, transform 0.2s, background-color 0.2s, border-color 0.2s;
    }
    html[data-theme="light"] .cursor-ring {
      border: 1px solid rgba(0, 0, 0, 0.2);
    }
    html[data-theme="retro"] .cursor-ring {
      border: 1px solid #00ff00;
      border-radius: 0;
    }
    html[data-theme="retro"] .cursor-dot {
      background: #00ff00;
      border-radius: 0;
    }

    /* Retro CRT Scanlines & Flicker */
    .crt-flicker {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
      background-size: 100% 4px, 4px 100%;
      z-index: 99999;
    }
    .crt-flicker::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: rgba(18, 16, 16, 0.08);
      opacity: 0.15;
      z-index: 100000;
      pointer-events: none;
      animation: crt-flicker-anim 0.15s infinite;
    }
    @keyframes crt-flicker-anim {
      0% { opacity: 0.1; }
      50% { opacity: 0.15; }
      100% { opacity: 0.1; }
    }

    /* Hide elements in retro */
    html[data-theme="retro"] .modern-glow {
      display: none !important;
    }
    html[data-theme="retro"] .success-card {
      border: 1px solid #00ff00 !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
    html[data-theme="retro"] .success-icon {
      border: 1px solid #00ff00 !important;
      border-radius: 0 !important;
      background: none !important;
      color: #00ff00 !important;
    }
    html[data-theme="retro"] .font-display {
      font-family: 'Press Start 2P', monospace !important;
      font-size: 1.5rem !important;
      line-height: 1.7 !important;
    }
    html[data-theme="retro"] .font-body {
      font-family: 'Share Tech Mono', monospace !important;
    }
    html[data-theme="retro"] .home-btn {
      border: 1px solid #00ff00 !important;
      border-radius: 0 !important;
      background: none !important;
      color: #00ff00 !important;
    }
  </style>
</head>
<body class="relative flex items-center justify-center min-h-screen px-5 font-body">
  <div class="dot-grid" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <!-- Ambient Light Effects (Modern Only) -->
  <div class="absolute top-1/3 left-1/4 w-72 h-72 bg-neutral-400/5 rounded-full blur-[120px] modern-glow" aria-hidden="true"></div>
  <div class="absolute bottom-1/3 right-1/4 w-80 h-80 bg-neutral-300/5 rounded-full blur-[140px] modern-glow" aria-hidden="true"></div>

  <!-- Main success card with spotlight glow coordinate tracker -->
  <div class="success-card glow-border-card relative z-10 max-w-md w-full rounded-3xl p-8 md:p-10 text-center">
    <div class="success-icon inline-flex items-center justify-center w-16 h-16 rounded-full border border-white/10 text-neutral-200 mb-6 bg-white/[0.02]">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
    </div>

    <h1 class="font-display text-4xl md:text-5xl uppercase tracking-wider text-white mb-4">
      Thank You!
    </h1>
    <p class="text-sm md:text-base text-neutral-400 leading-relaxed mb-8">
      Thank you for reaching out! I would love to get in contact with you and will review your message shortly. I'll get back to you as soon as possible.
    </p>

    <!-- Custom styled back home button -->
    <a href="index.html" class="home-btn inline-flex items-center justify-center w-full gap-3 px-6 py-4 rounded-full text-xs font-semibold tracking-[0.25em] uppercase transition-all duration-300 border border-white/10 bg-white/[0.03] hover:bg-white hover:text-black hover:border-white hover:-translate-y-0.5">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"></path>
      </svg>
      <span>Back to Home</span>
    </a>
  </div>

  <!-- Custom Cursor elements -->
  <div class="cursor-dot" id="cursorDot" aria-hidden="true"></div>
  <div class="cursor-ring" id="cursorRing" aria-hidden="true"></div>

  <script>
    // Initialize correct theme from local storage
    const savedTheme = localStorage.getItem("portfolio-theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);

    // If retro mode is active, inject scanlines glitch overlay
    if (savedTheme === 'retro') {
      const crt = document.createElement('div');
      crt.className = 'crt-flicker';
      document.body.appendChild(crt);
    }

    // Spotlights coordinate tracker binding
    const card = document.querySelector('.glow-border-card');
    if (card) {
      document.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        card.style.setProperty('--mouse-x', `${x}px`);
        card.style.setProperty('--mouse-y', `${y}px`);
      });
    }

    // Custom Cursor tracking logic
    const dot = document.getElementById("cursorDot");
    const ring = document.getElementById("cursorRing");
    const finePointer = window.matchMedia("(pointer: fine)").matches;
    let mx = 0, my = 0, rx = 0, ry = 0;

    if (finePointer && dot && ring) {
      document.addEventListener("mousemove", (e) => {
        mx = e.clientX;
        my = e.clientY;
        dot.style.left = mx + "px";
        dot.style.top = my + "px";
      });
      const animRing = () => {
        rx += (mx - rx) * 0.12;
        ry += (my - ry) * 0.12;
        ring.style.left = rx + "px";
        ring.style.top = ry + "px";
        requestAnimationFrame(animRing);
      };
      animRing();

      document.querySelectorAll("a").forEach((el) => {
        el.addEventListener("mouseenter", () => ring.classList.add("scale-[1.5]", "bg-white/10"));
        el.addEventListener("mouseleave", () => ring.classList.remove("scale-[1.5]", "bg-white/10"));
      });
    } else {
      if (dot) dot.style.display = "none";
      if (ring) ring.style.display = "none";
    }
  </script>
</body>
</html>
